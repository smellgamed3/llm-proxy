services:
  llm-provider:
    image: hashicorp/http-echo:1.0.0
    container_name: llm-provider-prod
    restart: unless-stopped
    command: ["-listen=:8080", "-text={\"ok\":true}"]

  llm-proxy:
    image: ghcr.io/smellgamed3/llm-proxy:${APP_VERSION:-1.9.7}
    pull_policy: always
    container_name: llm-proxy-prod
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-9090}:9090"
    environment:
      UPSTREAM_URL: ${UPSTREAM_URL:-http://llm-provider:8080}
      LISTEN_PORT: "9090"
      LOG_DIR: /data/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONFIG_FILE: /etc/llm-proxy/config.yaml
      # 8C32G 优化：proxy 纯转发用 4 workers，不争 DB 锁
      UVICORN_WORKERS: ${PROXY_WORKERS:-4}
      RECORDER_SOCKET: /var/run/llm-proxy/recorder.sock
      MAX_STREAM_BODY_BYTES: ${MAX_STREAM_BODY_BYTES:-52428800}
    volumes:
      - llm-proxy-logs:/data/logs
      - ./config.yaml:/etc/llm-proxy/config.yaml:ro
      - ./pricing.yaml:/etc/llm-proxy/pricing.yaml:ro
      # Recorder socket 通过 shared tmpfs 在 worker 间通信
      - recorder-socket:/var/run/llm-proxy
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 4G
        reservations:
          cpus: "2"
          memory: 1G
    depends_on:
      - llm-provider
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  analyzer:
    image: ghcr.io/smellgamed3/llm-proxy-analyzer:${APP_VERSION:-1.9.7}
    pull_policy: always
    container_name: llm-analyzer-prod
    restart: unless-stopped
    environment:
      RAW_DB: /data/logs/raw.db
      ANALYTICS_DB: /data/analytics/analytics.db
      BODIES_DIR: /data/logs/bodies
      PRICING_FILE: /etc/llm-proxy/pricing.yaml
      ANALYZER_INTERVAL: ${ANALYZER_INTERVAL:-5}
      ANALYZER_BATCH_SIZE: ${ANALYZER_BATCH_SIZE:-100}
      ANALYZER_NUM_WORKERS: ${ANALYZER_WORKERS:-2}
    volumes:
      - llm-proxy-logs:/data/logs
      - llm-analytics:/data/analytics
      - ./pricing.yaml:/etc/llm-proxy/pricing.yaml:ro
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      - llm-proxy

  api:
    image: ghcr.io/smellgamed3/llm-proxy-api:${APP_VERSION:-1.9.7}
    pull_policy: always
    container_name: llm-analytics-api-prod
    restart: unless-stopped
    ports:
      - "${API_PORT:-9091}:9091"
    environment:
      RAW_DB: /data/logs/raw.db
      ANALYTICS_DB: /data/analytics/analytics.db
      BODIES_DIR: /data/logs/bodies
      BACKUP_DIR: /data/backups
      ANALYZER_NUM_WORKERS: ${ANALYZER_WORKERS:-2}
      API_WORKERS: ${API_WORKERS:-2}
      API_RATE_LIMIT_ENABLED: ${API_RATE_LIMIT_ENABLED:-true}
      API_RATE_LIMIT_MAX_REQUESTS: ${API_RATE_LIMIT_MAX_REQUESTS:-300}
      API_RATE_LIMIT_WINDOW_SECONDS: ${API_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - llm-proxy-logs:/data/logs
      - llm-analytics:/data/analytics
      - backups:/data/backups
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      - analyzer

volumes:
  llm-proxy-logs:
    driver: local
  llm-analytics:
    driver: local
  recorder-socket:
    driver: local
  backups:
    driver: local
