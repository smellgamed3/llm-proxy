name: CI & Publish

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Run tests on every push/PR ────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Job 2: Build & push image — only on main branch or version tags ──────
  build-and-push:
    name: Build & Push to GHCR (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    needs: test  # only runs after ALL test matrix jobs pass
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: proxy
            dockerfile: Dockerfile
            image_suffix: ""
            title: llm-proxy
            description: Transparent HTTP/WebSocket proxy for recording LLM API traffic
          - name: analyzer
            dockerfile: Dockerfile.analyzer
            image_suffix: "-analyzer"
            title: llm-proxy-analyzer
            description: Analyzer worker for extracting and aggregating LLM traffic analytics
          - name: api
            dockerfile: Dockerfile.api
            image_suffix: "-api"
            title: llm-proxy-api
            description: Analytics query API and dashboard for LLM proxy

    permissions:
      contents: read
      packages: write
      id-token: write  # required for provenance attestation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.component.image_suffix }}
          tags: |
            # branch push → tag as branch name (e.g. "main")
            type=ref,event=branch
            # semver tags: v1.2.3 → 1.2.3, 1.2, 1, and "latest"
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # always include short commit SHA
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=${{ matrix.component.title }}
            org.opencontainers.image.description=${{ matrix.component.description }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for fast rebuilds
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}
          # Multi-platform: amd64 for servers, arm64 for Mac/Graviton
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Print image digest
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.component.image_suffix }}@${{ steps.build.outputs.digest }}"
