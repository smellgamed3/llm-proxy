<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Proxy Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="brand">LLM Proxy Analytics</span>
    <ul>
      <li><a href="/" class="active">Overview</a></li>
      <li><a href="/conversations.html">Conversations</a></li>
      <li><a href="/costs.html">Costs</a></li>
      <li><a href="/prompts.html">Prompts</a></li>
      <li><a href="/errors.html">Errors</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Overview</h1>

    <div class="cards" id="summary-cards">
      <div class="card">
        <div class="card-value" id="total-requests">—</div>
        <div class="card-label">Total Requests</div>
      </div>
      <div class="card">
        <div class="card-value" id="success-rate">—</div>
        <div class="card-label">Success Rate</div>
      </div>
      <div class="card">
        <div class="card-value" id="total-cost">—</div>
        <div class="card-label">Total Cost (USD)</div>
      </div>
      <div class="card">
        <div class="card-value" id="avg-latency">—</div>
        <div class="card-label">Avg Latency (ms)</div>
      </div>
    </div>

    <section class="chart-section">
      <h2>7-Day Trend</h2>
      <canvas id="trend-chart" height="80"></canvas>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
