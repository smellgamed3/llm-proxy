<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costs — LLM Proxy Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="app-layout">
  <main class="app-content">
    <div class="page-header">
      <h1>Costs</h1>
      <div class="time-range-selector">
        <button class="range-btn" data-range="1">Today</button>
        <button class="range-btn" data-range="7">7 Days</button>
        <button class="range-btn active" data-range="30">30 Days</button>
        <button class="range-btn" data-range="90">90 Days</button>
      </div>
    </div>
    <div id="cost-summary" class="cards"></div>
    <section class="chart-section">
      <h2 id="daily-cost-chart-title">Daily Cost (30 days)</h2>
      <canvas id="daily-cost-chart" height="80"></canvas>
    </section>
    <section>
      <h2>By Model</h2>
      <table class="data-table">
        <thead><tr><th>Model</th><th>Requests</th><th>Tokens</th><th>Cost (USD)</th></tr></thead>
        <tbody id="model-cost-tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
