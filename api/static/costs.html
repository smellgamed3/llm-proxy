<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costs — LLM Proxy Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="brand">LLM Proxy Analytics</span>
    <ul>
      <li><a href="/">Overview</a></li>
      <li><a href="/conversations.html">Conversations</a></li>
      <li><a href="/costs.html" class="active">Costs</a></li>
      <li><a href="/prompts.html">Prompts</a></li>
      <li><a href="/errors.html">Errors</a></li>
      <li><a href="/latency.html">Latency</a></li>
      <li><a href="/models.html">Models</a></li>
    </ul>
  </nav>
  <main class="container">
    <h1>Costs</h1>
    <div id="cost-summary" class="cards"></div>
    <section class="chart-section">
      <h2>Daily Cost (30 days)</h2>
      <canvas id="daily-cost-chart" height="80"></canvas>
    </section>
    <section>
      <h2>By Model</h2>
      <table class="data-table">
        <thead><tr><th>Model</th><th>Requests</th><th>Tokens</th><th>Cost (USD)</th></tr></thead>
        <tbody id="model-cost-tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
  <script>window.addEventListener('load', loadCostsPage);</script>
</body>
</html>
