<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errors — LLM Proxy Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="app-layout">
  <header class="app-header">
    <div class="header-brand">
      <span class="brand">LLM Proxy Analytics</span>
      <span class="header-version">v0.2.4</span>
    </div>
  </header>
  <aside class="app-sidebar">
    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Analytics</div>
        <a href="/" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 14V9m6 5V5m6 9V2"/></svg>
          Overview</a>
        <a href="/conversations.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4c0-.6.4-1 1-1h12c.6 0 1 .4 1 1v7c0 .6-.4 1-1 1h-4l-2 3v-3H3c-.6 0-1-.4-1-1V4z"/></svg>
          Conversations</a>
        <a href="/costs.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 5v8M7 7h3a1.5 1.5 0 010 3H7m0 0h3.5a1.5 1.5 0 010 3H7"/></svg>
          Costs</a>
        <a href="/models.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2L3 5.5v7L9 16l6-3.5v-7L9 2zM3 5.5L9 9m0 0v7m0-7l6-3.5"/></svg>
          Models</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Monitoring</div>
        <a href="/errors.html" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3L2 15h14L9 3z"/><path d="M9 8v3"/><circle cx="9" cy="13" r=".5" fill="currentColor"/></svg>
          Errors</a>
        <a href="/latency.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M9 5v4l2.5 1.5"/></svg>
          Latency</a>
        <a href="/analyzer.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h12v12H3z"/><path d="M6 11V7m3 4V5m3 6V8"/></svg>
          Analyzer</a>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Content</div>
        <a href="/prompts.html" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2h6l4 4v10c0 .6-.4 1-1 1H5c-.6 0-1-.4-1-1V3c0-.6.4-1 1-1z"/><path d="M11 2v4h4M7 10h4m-4 3h4"/></svg>
          Prompts</a>
      </div>
    </nav>
  </aside>
  <main class="app-content">
    <h1>Errors</h1>
    <div id="error-summary" class="cards"></div>

    <div class="chart-grid">
      <div class="chart-section">
        <h3>Error Trend (30 days)</h3>
        <canvas id="error-trend-chart"></canvas>
      </div>
      <div class="chart-section">
        <h3>Error Types Distribution</h3>
        <canvas id="error-type-chart"></canvas>
      </div>
    </div>

    <section>
      <h2>Recent Errors</h2>
      <table class="data-table">
        <thead><tr><th>Timestamp</th><th>Model</th><th>Error Type</th><th>Status Code</th><th>Status</th><th>Message</th></tr></thead>
        <tbody id="errors-tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
  <script>window.addEventListener('load', loadErrorsPage);</script>
</body>
</html>
