<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latency — LLM Proxy Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="app-layout">
  <main class="app-content">
    <div class="page-header">
      <h1>Latency Analysis</h1>
      <div class="time-range-selector">
        <button class="range-btn" data-range="1">Today</button>
        <button class="range-btn" data-range="7">7 Days</button>
        <button class="range-btn active" data-range="30">30 Days</button>
        <button class="range-btn" data-range="90">90 Days</button>
      </div>
    </div>

    <div class="cards" id="latency-cards">
      <div class="card">
        <div class="card-value" id="latency-p50">—</div>
        <div class="card-label">P50 (ms)</div>
      </div>
      <div class="card">
        <div class="card-value" id="latency-p95">—</div>
        <div class="card-label">P95 (ms)</div>
      </div>
      <div class="card">
        <div class="card-value" id="latency-p99">—</div>
        <div class="card-label">P99 (ms)</div>
      </div>
      <div class="card">
        <div class="card-value" id="latency-avg">—</div>
        <div class="card-label">Avg (ms)</div>
      </div>
      <div class="card">
        <div class="card-value" id="latency-count">—</div>
        <div class="card-label">Total Requests</div>
      </div>
    </div>

    <section class="chart-section">
      <h2 id="latency-trend-title">Daily Latency Trend (30 days)</h2>
      <canvas id="latency-trend-chart" height="80"></canvas>
    </section>

    <div class="chart-grid">
      <section class="chart-section">
        <h2>Latency by Model</h2>
        <canvas id="latency-by-model-chart" height="120"></canvas>
      </section>
      <section class="chart-section">
        <h2>Latency Distribution</h2>
        <canvas id="latency-dist-chart" height="120"></canvas>
      </section>
    </div>

    <section>
      <h2>Per-Model Breakdown</h2>
      <table class="data-table">
        <thead><tr><th>Model</th><th>Avg Latency (ms)</th><th>Requests</th></tr></thead>
        <tbody id="latency-model-tbody"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
