services:
  llm-provider:
    image: hashicorp/http-echo:1.0.0
    container_name: llm-provider-dev
    restart: unless-stopped
    command: ["-listen=:8080", "-text={\"ok\":true}"]

  llm-proxy:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: llm-proxy
    restart: unless-stopped
    working_dir: /app
    command: >
      uvicorn app.main:create_app --factory --host 0.0.0.0 --port 9090
      --reload --reload-dir /app/app --reload-dir /app/analyzer --log-level info
    ports:
      - "${PROXY_PORT:-9090}:9090"
    environment:
      UPSTREAM_URL: ${UPSTREAM_URL:-http://llm-provider:8080}
      LISTEN_PORT: "9090"
      LOG_DIR: /data/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONFIG_FILE: /etc/llm-proxy/config.yaml
    volumes:
      - llm-proxy-logs:/data/logs
      - ./app:/app/app
      - ./analyzer:/app/analyzer
      - ./config.yaml:/etc/llm-proxy/config.yaml:ro
      - ./pricing.yaml:/etc/llm-proxy/pricing.yaml:ro
    depends_on:
      - llm-provider
    labels:
      # Traefik 配置
      - "traefik.enable=true"
      - "traefik.http.routers.llm-proxy.rule=Host(`${TRAEFIK_HOST:-llm2.snow13.top}`)"
      - "traefik.http.routers.llm-proxy.entrypoints=websecure"
      - "traefik.http.routers.llm-proxy.tls=true"
      - "traefik.http.routers.llm-proxy.service=llm-proxy"
      - "traefik.http.services.llm-proxy.loadbalancer.server.port=9090"

  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: llm-analyzer
    restart: unless-stopped
    working_dir: /app
    command: >
      watchfiles --filter python --grace-period 0.2
      "python -m analyzer" /app/analyzer /app/app
    environment:
      RAW_DB: /data/logs/raw.db
      ANALYTICS_DB: /data/analytics/analytics.db
      BODIES_DIR: /data/logs/bodies
      PRICING_FILE: /etc/llm-proxy/pricing.yaml
      ANALYZER_INTERVAL: ${ANALYZER_INTERVAL:-5}
      ANALYZER_BATCH_SIZE: ${ANALYZER_BATCH_SIZE:-100}
    volumes:
      - llm-proxy-logs:/data/logs
      - llm-analytics:/data/analytics
      - ./app:/app/app
      - ./analyzer:/app/analyzer
      - ./pricing.yaml:/etc/llm-proxy/pricing.yaml:ro
    depends_on:
      - llm-proxy

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: llm-analytics-api
    restart: unless-stopped
    working_dir: /app
    command: >
      uvicorn api.app:create_app --factory --host 0.0.0.0 --port 9091
      --reload --reload-dir /app/api --reload-dir /app/analyzer --log-level info
    ports:
      - "${API_PORT:-9091}:9091"
    environment:
      RAW_DB: /data/logs/raw.db
      ANALYTICS_DB: /data/analytics/analytics.db
      BODIES_DIR: /data/logs/bodies
      ADMIN_KEY_HASH: ${ADMIN_KEY_HASH:-}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
    volumes:
      - llm-proxy-logs:/data/logs
      - llm-analytics:/data/analytics
      - ./api:/app/api
      - ./analyzer:/app/analyzer
    depends_on:
      - analyzer

volumes:
  llm-proxy-logs:
    driver: local
  llm-analytics:
    driver: local
